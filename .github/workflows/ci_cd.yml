name: CineMatch CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # =============================
  # JOB 1: RUN TESTS
  # =============================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn fastapi httpx python-dotenv \
                      requests scipy pyyaml pytest pytest-asyncio \
                      mlflow uvicorn

      - name: Set environment variables
        run: |
          echo "TMDB_API_KEY=test_api_key_12345" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_URI=file:///tmp/mlflow_test" >> $GITHUB_ENV
          echo "LOG_DIR=/tmp/logs" >> $GITHUB_ENV

      - name: Create required directories
        run: |
          mkdir -p /tmp/logs
          mkdir -p logs

      - name: Run ML pipeline tests
        run: |
          pytest tests/test_ml.py -v --tb=short

      - name: Run API tests
        run: |
          pytest tests/test_api.py -v --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # =============================
  # JOB 2: VALIDATE CONFIGS
  # =============================
  validate:
    name: Validate Config Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate prometheus config
        run: |
          python -c "
          import yaml
          with open('config/prometheus.yml') as f:
              yaml.safe_load(f)
          print('prometheus.yml valid')
          "

      - name: Validate alerts config
        run: |
          python -c "
          import yaml
          with open('config/alerts.yml') as f:
              yaml.safe_load(f)
          print('alerts.yml valid')
          "

      - name: Validate Grafana dashboard
        run: |
          python -c "
          import json
          with open('config/grafana/cinematch_dashboard.json') as f:
              json.load(f)
          print('cinematch_dashboard.json valid')
          "

      - name: Validate DVC pipeline
        run: |
          pip install pyyaml
          python -c "
          import yaml
          with open('dvc.yaml') as f:
              d = yaml.safe_load(f)
          print('dvc.yaml valid - stages:', list(d['stages'].keys()))
          "

      - name: Test imports
        run: |
          pip install pandas numpy scikit-learn
          python -c "
          import sys
          sys.path.insert(0, 'ml_pipeline')
          from preprocess import preprocess
          print('preprocess import OK')
          from data_loader import load_data
          print('data_loader import OK')
          "

  # =============================
  # JOB 3: BUILD DOCKER IMAGES
  # Only on push to main
  # =============================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [ test, validate ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -f Dockerfile.backend -t cinematch-backend:${{ github.sha }} .
          echo "Backend built successfully"

      - name: Build frontend image
        run: |
          docker build -f Dockerfile.frontend -t cinematch-frontend:${{ github.sha }} .
          echo "Frontend built successfully"

      - name: Verify images
        run: |
          docker images | grep cinematch