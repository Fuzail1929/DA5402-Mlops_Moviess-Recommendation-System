services:
  airflow-webserver:
    build: .
    container_name: airflow-webserver
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow_db:/opt/airflow
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./mlruns:/opt/airflow/mlruns
      - ./mlruns:/mlruns
      - ./data:/opt/airflow/data
    networks:
      - cinematch-network

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    restart: always
    depends_on:
      - airflow-init
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow_db:/opt/airflow
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./mlruns:/opt/airflow/mlruns
      - ./mlruns:/mlruns
      - ./data:/opt/airflow/data
    networks:
      - cinematch-network

  airflow-init:
    build: .
    container_name: airflow-init
    entrypoint: >
      bash -c "airflow db init && airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@example.com || true"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow_db:/opt/airflow
      - ./ml_pipeline:/opt/airflow/ml_pipeline
      - ./mlruns:/opt/airflow/mlruns
      - ./mlruns:/mlruns
      - ./data:/opt/airflow/data
    networks:
      - cinematch-network

  mlflow:
    image: python:3.10-slim
    container_name: mlflow-server
    restart: always
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/opt/airflow/mlruns
    command: >
      bash -c "pip install mlflow && mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns --host 0.0.0.0 --port 5000 --allowed-hosts '*'"
    networks:
      - cinematch-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - cinematch-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources_prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml
      - ./config/grafana/grafana_dashboard_provider.yml:/etc/grafana/provisioning/dashboards/provider.yml
      - ./config/grafana/cinematch_dashboard.json:/etc/grafana/provisioning/dashboards/cinematch_dashboard.json
    depends_on:
      - prometheus
    networks:
      - cinematch-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - cinematch-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - cinematch-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cinematch-backend
    env_file:
      - .env
    ports:
      - "8001:8000"
    networks:
      - cinematch-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cinematch-frontend
    ports:
      - "5050:80"
    depends_on:
      - backend
    networks:
      - cinematch-network

networks:
  cinematch-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data: