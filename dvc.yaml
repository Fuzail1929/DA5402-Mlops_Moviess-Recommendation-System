stages:
  load_data:
    cmd: python ml_pipeline/data_loader.py
    deps:
      - data/tmdb_5000_movies.csv
      - data/tmdb_5000_credits.csv
      - ml_pipeline/data_loader.py
    outs:
      - logs/data_validation_report.json

  preprocess:
    cmd: |
      python -c "import sys; sys.path.insert(0, 'ml_pipeline'); from data_loader import load_data; from preprocess import preprocess; df = load_data(); preprocess(df, save_features=True)"
    deps:
      - data/tmdb_5000_movies.csv
      - data/tmdb_5000_credits.csv
      - ml_pipeline/preprocess.py
      - ml_pipeline/data_loader.py
    outs:
      - ml_pipeline/feature_store

  train:
    cmd: |
      python -c "import sys; sys.path.insert(0, 'ml_pipeline'); from train import train; train()"
    deps:
      - ml_pipeline/feature_store
      - ml_pipeline/train.py
    outs:
      - ml_pipeline/model/movies.pkl
      - ml_pipeline/model/similarity.pkl
      - ml_pipeline/model/similarity_sparse.pkl
      - ml_pipeline/model/vectorizer.pkl
      - ml_pipeline/model/feature_impact.json
      - ml_pipeline/model/model_version.json
    metrics:
      - ml_pipeline/model/baseline_statistics.json:
          cache: false

  evaluate:
    cmd: |
      python -c "import json; f=open('ml_pipeline/model/model_version.json'); v=json.load(f); print('Genre match rate:', v.get('avg_genre_match_rate')); print('Most important feature:', v.get('most_important_feature')); print('Memory reduction:', v.get('memory_reduction_pct'), '%')"
    deps:
      - ml_pipeline/model/model_version.json